services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - graph-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - graph-network

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    networks:
      - graph-network

  api-service:
    build:
      context: ..
      dockerfile: services/api-service/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - kafka
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - graph-network

  # Fixed: nlp-service was missing entirely
  nlp-service:
    build:
      context: ..
      dockerfile: services/nlp-service/Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GEMINI_API_KEY: AIzaSyCctXHFT0Fjsv-DoTVKMMNWdnYz9jgT1Jk
    networks:
      - graph-network

  # Fixed: graph-builder was missing entirely
  graph-builder:
    build:
      context: ..
      dockerfile: services/graph-builder/Dockerfile
    depends_on:
      - kafka
      - neo4j
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    networks:
      - graph-network

  # Added: frontend was missing
  frontend:
    build:
      context: ..
      dockerfile: frontend/graph-ui/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api-service
    environment:
      REACT_APP_API_URL: http://localhost:8000
    networks:
      - graph-network

networks:
  graph-network:
    driver: bridge